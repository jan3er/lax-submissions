name = "Lax2Proofs"
defaultTargets = ["Lax2Proofs"]

[leanOptions]
autoImplicit = false

# mathlib is part of the archive environment (the pin is archive-wide)
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "c5ea00351c28e24afc9f0f84379aa41082b1188f"

[[require]]
name = "Lax2"
path = "../concepts"

[[lean_lib]]
name = "Lax2Proofs"

# twin-width tower: the twin-width parameter of submission Lax1
[[require]]
name = "Lax1"
git = "https://github.com/jan3er/lax-submissions"
rev = "c30630a91495715bbbca6fae669590b361cfc101"
subDir = "twin-width-treewidth-separation/concepts"
